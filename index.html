
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agência do BN</title>
<style>
body{font-family:Arial;background:#0a0015;color:white;margin:0;padding:20px}
.card{background:#170022;padding:20px;border-radius:16px;margin:15px auto;max-width:420px;border:1px solid #8a2be2}
h1{text-align:center;color:#b66dff}
button{width:100%;padding:12px;margin:8px 0;border:none;border-radius:10px;background:#8a2be2;color:white}
input{width:95%;padding:10px;margin:6px 0;border-radius:8px;border:none}
.hidden{display:none}
</style>
</head>
<body>
<h1>Agência do BN 💜</h1>

<div class="card" id="home">
<h2>Bem-vindo</h2>
<p>Escolha uma opção:</p>
<button onclick="abrirCadastro()">Criar conta</button>
<button onclick="abrirLogin()">Já tenho uma conta</button>
</div>

<div class="card hidden" id="cadastro">
<h2>Criar conta</h2>
<input placeholder="CPF">
<input placeholder="Telefone">
<input placeholder="E-mail">
<input type="password" placeholder="Senha">
<input type="password" placeholder="Confirmar senha">
<button>Cadastrar</button>
<button onclick="voltar()">Voltar</button>
</div>

<div class="card hidden" id="login">
<h2>Entrar</h2>
<input placeholder="E-mail ou telefone">
<input type="password" placeholder="Senha">
<button>Entrar</button>
<p>Esqueci minha senha</p>
<button onclick="voltar()">Voltar</button>
</div>

<script>
function abrirCadastro(){
home.classList.add("hidden");
cadastro.classList.remove("hidden");
}
function abrirLogin(){
home.classList.add("hidden");
login.classList.remove("hidden");
}
function voltar(){
home.classList.remove("hidden");
cadastro.classList.add("hidden");
login.classList.add("hidden");
}
</script>

</body>
</html>
