
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBF0hscR76logM5SkOjYDNtvAn3R4pQWAY",
  authDomain: "agencia-do-bn-17ffc.firebaseapp.com",
  projectId: "agencia-do-bn-17ffc",
  storageBucket: "agencia-do-bn-17ffc.firebasestorage.app",
  messagingSenderId: "1077634284111",
  appId: "1:1077634284111:web:812c7dd2872cadc74d083a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.cadastrar = async function(email, senha){
  try{
    await createUserWithEmailAndPassword(auth, email, senha);
    alert("Cadastro realizado!");
  }catch(e){
    alert(e.message);
  }
}

window.login = async function(email, senha){
  try{
    await signInWithEmailAndPassword(auth, email, senha);
    alert("Login realizado!");
  }catch(e){
    alert(e.message);
  }
}
</script>
